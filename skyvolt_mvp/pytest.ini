[pytest]
# Several packages each have a `test/` directory with the same name; importlib
# import mode keeps them distinct.
addopts = --import-mode=importlib
testpaths =
    src/skyvolt_localization/test
    src/skyvolt_fleet/test
    src/skyvolt_eval/test
    src/skyvolt_manipulator/test
    src/skyvolt_vision/test
    src/skyvolt_safety/test
pythonpath =
    src/skyvolt_localization
    src/skyvolt_fleet
    src/skyvolt_eval
    src/skyvolt_manipulator
    src/skyvolt_vision
    src/skyvolt_safety
